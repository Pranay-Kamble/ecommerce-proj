<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Your Email</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
        }
        .header {
            background-color: #2563eb; /* A nice professional blue */
            padding: 24px;
            text-align: center;
        }
        .header h1 {
            color: #ffffff;
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }
        .content {
            padding: 32px 24px;
            text-align: center;
        }
        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
            margin: 0 0 24px 0;
        }
        .otp-container {
            background-color: #f3f4f6;
            border-radius: 6px;
            padding: 16px;
            margin: 24px 0;
            letter-spacing: 4px;
        }
        .otp-code {
            font-size: 32px;
            font-weight: 700;
            color: #111827;
            margin: 0;
        }
        .footer {
            background-color: #f9fafb;
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: #6b7280;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Account Verification</h1>
    </div>

    <div class="content">
        <p>Hello,</p>
        <p>Thank you for registering. To complete your account setup and verify your email address, please enter the following 6-digit verification code:</p>

        <div class="otp-container">
            <p class="otp-code">{{.OTP}}</p>
        </div>

        <p>This code will expire in <strong>15 minutes</strong>.</p>
        <p>If you did not request this code, you can safely ignore this email.</p>
    </div>

<!--    <div class="footer">-->
<!--        <p>&copy; 2026 Your E-Commerce Platform. All rights reserved.</p>-->
<!--    </div>-->
</div>
</body>
</html>
